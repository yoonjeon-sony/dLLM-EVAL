wandb:
  entity: null
  resume: "auto"

experiment:
  project: "mmada-parallel-sft"
  name: "thinkmorph_zebracot_interleave"
  output_dir: "/group2/dgm/yoonjeon/ckpts/sft_MMaDA-PM-thinkmorph_zebracot"
  resume_from_checkpoint: true
  log_every: 50
  save_every: 2000
  log_grad_norm_every: 200
  generate_every: 1000000

model:
  vq_model:
    type: "magvitv2"
    vq_model_name: "showlab/magvitv2"

  mmada:
    pretrained_model_path: "tyfeld/MMaDA-Parallel-M"
    tokenizer_path: "tyfeld/MMaDA-Parallel-M"
    w_clip_vit: false
    new_vocab_size: 134656
    llm_vocab_size: 126464
    codebook_size: 8192
    num_vq_tokens: 1024
    num_new_special_tokens: 0
    tie_word_embeddings: false

  gradient_checkpointing: true

dataset:
  # Path to the ThinkMorph + ZebraCoT subset spec.
  yaml_path: "/music-home-shared-disk/user/yoonjeon.kim/dLLM-RL/train_sft/scripts/data/thinkmorph_zebracot_complete.yaml"
  # Local root where the actual image/jsonl data lives.  The loader remaps the
  # yaml's /group2/dgm/yoonjeon/data/ prefixes onto this directory.
  data_root: "/scratch2/yoonjeon.kim/data/"
  val_split: 0.02
  split_seed: 42
  skip_modes: ["grounding"]

  params:
    num_workers: 4
    pin_memory: true
    persistent_workers: true

  preprocessing:
    max_seq_length: 512   # output text slot length (also input text padding)
    resolution: 512
    center_crop: false
    random_flip: false

optimizer:
  name: adamw
  params:
    learning_rate: 5.0e-5
    scale_lr: false
    beta1: 0.9
    beta2: 0.999
    weight_decay: 0.01
    epsilon: 1.0e-8

lr_scheduler:
  scheduler: "cosine"
  params:
    learning_rate: ${optimizer.params.learning_rate}
    warmup_steps: 500
    min_lr_scale: 0.1

training:
  gradient_accumulation_steps: 16
  noise_type: "mask"
  batch_size: 1                 # per-GPU micro batch
  mixed_precision: "bf16"
  enable_tf32: true
  seed: 42
  num_train_epochs: 15
  max_train_steps: 50000
  overfit_one_batch: false
  cond_dropout_prob: 0.1
  min_masking_rate: 0.0
  label_smoothing: 0.0
  max_grad_norm: 1.0
  guidance_scale: 1.5
  generation_timesteps: 12
  text_coeff: 1.0
  image_coeff: 1.0

mask_schedule:
  schedule: "cosine"
